# =============================================================================
# LVGL TOUCHSCREEN INTERFACE - Woonkamer Dashboard (custom, page 1)
# =============================================================================
# Page 1 (main_page): 3x3 grid
#   Row 0: Standaard-scene buttons (Woonkamer / Slaapkamer / Computerkamer)
#          - highlight (checkable) when their proxy light is ON
#   Row 1: matching "Lampen Uit" buttons - plain tap, no highlight
#   Row 2: Ambient TV kijken (highlight) | TV kijken in bed (highlight) | More
# Page 2 (extras_page): placeholder for now - just a Back button.
# Top layer: clock + outdoor weather (visible on every page).
# =============================================================================

lvgl:
  buffer_size: 100%
  on_idle:
    timeout: 10min
    then:
      - light.turn_off: backlight
      - lvgl.pause:
          show_snow: false
      - globals.set:
          id: screen_asleep
          value: 'true'
  top_layer:
    widgets:

      - label:
          text: "--:--"
          id: display_time
          styles: roboto15_style
          align: top_mid
          y: 4
          text_align: center
          text_color: 0xFFFFFF

      - label:
          text_font: icon_font_small
          text: $thermometer
          align: top_left
          x: 8
          y: 4
          text_color: 0xFFFFFF

      - label:
          text: "--.-° / --.-°"
          id: temperatures_label
          styles: roboto15_style
          align: top_left
          x: 28
          y: 4
          text_color: 0xFFFFFF

  pages:

    # ===================================================================
    # PAGE 1: main
    # ===================================================================
    - id: main_page
      layout:
        type: grid
        grid_columns: [fr(1), fr(1), fr(1)]
        grid_rows: [fr(1), fr(1), fr(1)]
      scrollbar_mode: "off"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 34
      pad_bottom: 5
      pad_left: 5
      pad_right: 5

      widgets:

        # ------------------- ROW 0: "on" scene buttons --------------------
        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: woonkamer_scene_on_button
            styles: control
            grid_cell_column_pos: 0
            grid_cell_row_pos: 0
            widgets:
              - label:
                  text_font: $icon_font
                  align: center
                  y: -20
                  text: $sofa
              - label:
                  align: bottom_mid
                  text: "Woonkamer"
              - label:
                  text_font: icon_font_small
                  align: top_left
                  x: 2
                  y: 2
                  text_color: 0xFFFFFF
                  text: $thermometer
              - label:
                  align: top_left
                  x: 10
                  y: 2
                  id: woonkamer_temp_label
                  styles: roboto15_style
                  text_color: 0xFFFFFF
                  text: "--°"
              - label:
                  text_font: icon_font_small
                  align: top_left
                  x: 88
                  y: 2
                  text_color: 0xFFFFFF
                  text: $water_percent
              - label:
                  align: top_left
                  x: 96
                  y: 2
                  id: woonkamer_humidity_label
                  styles: roboto15_style
                  text_color: 0xFFFFFF
                  text: "--%"
            on_press:
              - homeassistant.service:
                  service: scene.turn_on
                  data:
                    entity_id: scene.standaard_lampen_kleur

        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: slaapkamer_scene_on_button
            styles: control
            grid_cell_column_pos: 1
            grid_cell_row_pos: 0
            widgets:
              - label:
                  text_font: $icon_font
                  align: center
                  y: -20
                  text: $bed
              - label:
                  align: bottom_mid
                  text: "Slaapkamer"
              - label:
                  text_font: icon_font_small
                  align: top_left
                  x: 2
                  y: 2
                  text_color: 0xFFFFFF
                  text: $thermometer
              - label:
                  align: top_left
                  x: 10
                  y: 2
                  id: slaapkamer_temp_label
                  styles: roboto15_style
                  text_color: 0xFFFFFF
                  text: "--°"
              - label:
                  text_font: icon_font_small
                  align: top_left
                  x: 88
                  y: 2
                  text_color: 0xFFFFFF
                  text: $water_percent
              - label:
                  align: top_left
                  x: 96
                  y: 2
                  id: slaapkamer_humidity_label
                  styles: roboto15_style
                  text_color: 0xFFFFFF
                  text: "--%"
            on_press:
              - homeassistant.service:
                  service: scene.turn_on
                  data:
                    entity_id: scene.standaard_lampen_slaapkamer

        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: computerkamer_scene_on_button
            styles: control
            grid_cell_column_pos: 2
            grid_cell_row_pos: 0
            widgets:
              - label:
                  text_font: $icon_font
                  align: center
                  y: -20
                  text: $desktop_tower_monitor
              - label:
                  align: bottom_mid
                  text: "Computerkamer"
              - label:
                  text_font: icon_font_small
                  align: top_left
                  x: 2
                  y: 2
                  text_color: 0xFFFFFF
                  text: $thermometer
              - label:
                  align: top_left
                  x: 10
                  y: 2
                  id: computerkamer_temp_label
                  styles: roboto15_style
                  text_color: 0xFFFFFF
                  text: "--°"
              - label:
                  text_font: icon_font_small
                  align: top_left
                  x: 88
                  y: 2
                  text_color: 0xFFFFFF
                  text: $water_percent
              - label:
                  align: top_left
                  x: 96
                  y: 2
                  id: computerkamer_humidity_label
                  styles: roboto15_style
                  text_color: 0xFFFFFF
                  text: "--%"
            on_press:
              - homeassistant.service:
                  service: scene.turn_on
                  data:
                    entity_id: scene.lampen_computerkamer

        # ------------------- ROW 1: "off" scene buttons - plain -----------
        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: woonkamer_scene_off_button
            styles: webhook
            grid_cell_column_pos: 0
            grid_cell_row_pos: 1
            widgets:
              - label:
                  text_font: $icon_font
                  align: center
                  y: -20
                  text: $lightbulb_group_off
              - label:
                  align: bottom_mid
                  text: "Uit"
            on_press:
              - homeassistant.service:
                  service: scene.turn_on
                  data:
                    entity_id: scene.lampen_woonkamer_uit

        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: slaapkamer_scene_off_button
            styles: webhook
            grid_cell_column_pos: 1
            grid_cell_row_pos: 1
            widgets:
              - label:
                  text_font: $icon_font
                  align: center
                  y: -20
                  text: $lightbulb_group_off
              - label:
                  align: bottom_mid
                  text: "Uit"
            on_press:
              - homeassistant.service:
                  service: scene.turn_on
                  data:
                    entity_id: scene.lampen_slaapkamer_uit

        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: computerkamer_scene_off_button
            styles: webhook
            grid_cell_column_pos: 2
            grid_cell_row_pos: 1
            widgets:
              - label:
                  text_font: $icon_font
                  align: center
                  y: -20
                  text: $lightbulb_group_off
              - label:
                  align: bottom_mid
                  text: "Uit"
            on_press:
              - homeassistant.service:
                  service: scene.turn_on
                  data:
                    entity_id: scene.lampen_computerkamer_uit

        # ------------------- ROW 2: TV scenes + More -----------------------
        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: tv_ambient_button
            styles: control
            grid_cell_column_pos: 0
            grid_cell_row_pos: 2
            widgets:
              - label:
                  text_font: $icon_font
                  align: center
                  y: -20
                  text: $ledstrip
              - label:
                  align: bottom_mid
                  text: "TV kijken"
            on_press:
              - homeassistant.service:
                  service: scene.turn_on
                  data:
                    entity_id: scene.ambient_lighting_voor_tv_kijken

        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: tv_bed_button
            styles: control
            grid_cell_column_pos: 1
            grid_cell_row_pos: 2
            widgets:
              - label:
                  text_font: $icon_font
                  align: center
                  y: -20
                  text: $ledstrip
              - label:
                  align: bottom_mid
                  text: "TV in bed"
            on_press:
              - homeassistant.service:
                  service: scene.turn_on
                  data:
                    entity_id: scene.tv_kijken_in_bed

        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: more_nav_button
            styles: control
            grid_cell_column_pos: 2
            grid_cell_row_pos: 2
            widgets:
              - label:
                  text_font: $icon_font
                  align: center
                  y: -20
                  text: $chevron_right
              - label:
                  align: bottom_mid
                  text: "More"
            on_click:
              - lvgl.page.show:
                  id: extras_page
                  animation: NONE
                  time: 50ms

    # ===================================================================
    # PAGE 2: extras - 3D printer status
    # ===================================================================
    - id: extras_page
      layout:
        type: grid
        grid_columns: [fr(1), fr(1), fr(1)]
        grid_rows: [fr(1), fr(1), fr(1)]
      scrollbar_mode: "off"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 34
      pad_bottom: 5
      pad_left: 5
      pad_right: 5

      widgets:

        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: printer_button
            styles: control
            grid_cell_column_pos: 0
            grid_cell_row_pos: 0
            widgets:
              - label:
                  text_font: $icon_font
                  align: center
                  y: -20
                  text: $printer
              - label:
                  align: top_right
                  id: printer_progress_label
                  text: "--%"
              - label:
                  align: bottom_mid
                  text: "Printer"
            on_press:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.bambulab_a1_mini_stopcontact_1

        - button:
            height: $button_height_single
            width: $button_width
            clickable: false
            styles: webhook
            grid_cell_column_pos: 1
            grid_cell_row_pos: 0
            widgets:
              - label:
                  text_font: $icon_font
                  align: center
                  y: -20
                  text: $progress_clock
              - label:
                  align: bottom_mid
                  id: printer_status_label
                  text: "--"

        - button:
            height: $button_height_single
            width: $button_width
            clickable: false
            styles: webhook
            grid_cell_column_pos: 2
            grid_cell_row_pos: 0
            widgets:
              - label:
                  text_font: $icon_font
                  align: center
                  y: -20
                  text: $file_document_outline
              - label:
                  align: bottom_mid
                  id: printer_job_label
                  text: "--"

        - button:
            height: $button_height_single
            width: $button_width
            clickable: false
            styles: webhook
            grid_cell_column_pos: 0
            grid_cell_row_pos: 1
            widgets:
              - label:
                  text_font: $icon_font
                  align: center
                  y: -20
                  text: $timer_sand
              - label:
                  align: bottom_mid
                  id: printer_remaining_label
                  text: "--"

        - button:
            height: $button_height_single
            width: $button_width
            clickable: false
            styles: webhook
            grid_cell_column_pos: 1
            grid_cell_row_pos: 1
            widgets:
              - label:
                  text_font: $icon_font
                  align: center
                  y: -20
                  text: $clock_check_outline
              - label:
                  align: bottom_mid
                  id: printer_finish_label
                  text: "--:--"

        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: extras_back_button
            styles: control
            grid_cell_column_pos: 2
            grid_cell_row_pos: 2
            widgets:
              - label:
                  text_font: $icon_font
                  align: center
                  y: -20
                  text: $chevron_left
              - label:
                  align: bottom_mid
                  text: "Back"
            on_click:
              - lvgl.page.show:
                  id: main_page
                  animation: NONE
                  time: 50ms
