# =============================================================================
# LVGL TOUCHSCREEN INTERFACE - Woonkamer Dashboard (custom)
# =============================================================================
# 3x4 grid: 6 light toggles, 4 scene buttons, 1 printer toggle, 1 spare cell.
# Top layer: clock + outdoor weather (visible on every page).
# =============================================================================

lvgl:
  buffer_size: 100%
  top_layer:
    widgets:

      - label:
          text: "--:--"
          id: display_time
          styles: roboto15_style
          align: top_mid
          y: 4
          text_align: center
          text_color: 0xFFFFFF

      - label:
          text_font: icon_font_small
          text: $thermometer
          align: top_left
          x: 8
          y: 4
          text_color: 0xFFFFFF

      - label:
          text: "--°"
          id: weather_temp_label
          styles: roboto15_style
          align: top_left
          x: 28
          y: 4
          text_color: 0xFFFFFF

      - label:
          text: ""
          id: weather_condition_label
          styles: roboto15_style
          align: top_left
          x: 62
          y: 4
          text_color: 0xFFFFFF

  pages:
    - id: main_page
      layout:
        type: grid
        grid_columns: [fr(1), fr(1), fr(1)]
        grid_rows: [fr(1), fr(1), fr(1), fr(1)]
      scrollbar_mode: "off"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 34
      pad_bottom: 5
      pad_left: 5
      pad_right: 5

      widgets:

        # ------------------- ROW 0: lights ------------------------------
        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: bank_lamp_button
            styles: control
            grid_cell_column_pos: 0
            grid_cell_row_pos: 0
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Bank"
            on_press:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.bank_lamp

        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: dressoir_lamp_button
            styles: control
            grid_cell_column_pos: 1
            grid_cell_row_pos: 0
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Dressoir"
            on_press:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.dressoir_lamp

        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: grote_bol_button
            styles: control
            grid_cell_column_pos: 2
            grid_cell_row_pos: 0
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Grote Bol"
            on_press:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.grote_bol

        # ------------------- ROW 1: lights ------------------------------
        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: kleine_bol_button
            styles: control
            grid_cell_column_pos: 0
            grid_cell_row_pos: 1
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Kleine Bol"
            on_press:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.kleine_bol

        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: staande_lamp_button
            styles: control
            grid_cell_column_pos: 1
            grid_cell_row_pos: 1
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Staande Lamp"
            on_press:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.staande_lamp

        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: tv_light_bar_button
            styles: control
            grid_cell_column_pos: 2
            grid_cell_row_pos: 1
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $ledstrip
              - label:
                  align: bottom_left
                  text: "TV Bar"
            on_press:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.tv_light_bar

        # ------------------- ROW 2: scenes -------------------------------
        # Scenes have no on/off state, so these are plain action buttons
        # (not checkable) - pressing one just re-applies that scene.
        - button:
            height: $button_height_single
            width: $button_width
            styles: webhook
            grid_cell_column_pos: 0
            grid_cell_row_pos: 2
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $ledstrip
              - label:
                  align: bottom_left
                  text: "TV Paars"
            on_press:
              - homeassistant.service:
                  service: scene.turn_on
                  data:
                    entity_id: scene.ambient_lighting_voor_tv_kijken

        - button:
            height: $button_height_single
            width: $button_width
            styles: webhook
            grid_cell_column_pos: 1
            grid_cell_row_pos: 2
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $ledstrip
              - label:
                  align: bottom_left
                  text: "TV Groen"
            on_press:
              - homeassistant.service:
                  service: scene.turn_on
                  data:
                    entity_id: scene.ambient_lighting_voor_tv_kijken_groen

        - button:
            height: $button_height_single
            width: $button_width
            styles: webhook
            grid_cell_column_pos: 2
            grid_cell_row_pos: 2
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Lampen Uit"
            on_press:
              - homeassistant.service:
                  service: scene.turn_on
                  data:
                    entity_id: scene.lampen_woonkamer_uit

        # ------------------- ROW 3: scene + printer -----------------------
        - button:
            height: $button_height_single
            width: $button_width
            styles: webhook
            grid_cell_column_pos: 0
            grid_cell_row_pos: 3
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Standaard"
            on_press:
              - homeassistant.service:
                  service: scene.turn_on
                  data:
                    entity_id: scene.standaard_lampen_kleur

        - button:
            height: $button_height_single
            width: $button_width
            checkable: true
            id: printer_button
            styles: control
            grid_cell_column_pos: 1
            grid_cell_row_pos: 3
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $printer
              - label:
                  align: top_right
                  id: printer_progress_label
                  text: "--%"
              - label:
                  align: bottom_left
                  text: "Printer"
            on_press:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.bambulab_a1_mini_stopcontact_1

        # Cell (2, 3) intentionally left empty - room for a 12th button
