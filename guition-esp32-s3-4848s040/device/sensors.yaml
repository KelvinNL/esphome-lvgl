# =============================================================================
# SENSORS - Woonkamer Dashboard (custom, built for Kelvin's own entities)
# =============================================================================
# Pattern: each sensor "watches" a Home Assistant entity. When it changes,
# it updates a widget in lvgl_woonkamer.yaml (a label's text, or a button's
# "checked" highlight state). This file only READS from Home Assistant.
# Sending commands (button presses) happens in lvgl_woonkamer.yaml.
# =============================================================================

sensor:

  # Outdoor temperature, from the weather entity's "temperature" attribute
  - platform: homeassistant
    entity_id: weather.forecast_thuis
    attribute: temperature
    id: weather_temperature
    on_value:
      - lvgl.label.update:
          id: weather_temp_label
          text:
            format: "%.0f°"
            args: [ 'x' ]

  # 3D printer progress percentage
  - platform: homeassistant
    entity_id: sensor.a1mini_0309da532001059_printvoortgang
    id: printer_progress
    on_value:
      - lvgl.label.update:
          id: printer_progress_label
          text:
            format: "%.0f%%"
            args: [ 'x' ]


text_sensor:

  # Weather condition text, e.g. "partlycloudy", "rainy"
  - platform: homeassistant
    entity_id: weather.forecast_thuis
    id: weather_condition
    on_value:
      - lvgl.label.update:
          id: weather_condition_label
          text: !lambda return x.c_str();


binary_sensor:

  # ---------------------------------------------------------------------
  # LIGHTS - each watches a light entity and highlights its button when on
  # ---------------------------------------------------------------------
  - platform: homeassistant
    id: bank_lamp_state
    entity_id: light.bank_lamp
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: bank_lamp_button
          state:
            checked: !lambda return x;

  - platform: homeassistant
    id: dressoir_lamp_state
    entity_id: light.dressoir_lamp
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: dressoir_lamp_button
          state:
            checked: !lambda return x;

  - platform: homeassistant
    id: grote_bol_state
    entity_id: light.grote_bol
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: grote_bol_button
          state:
            checked: !lambda return x;

  - platform: homeassistant
    id: kleine_bol_state
    entity_id: light.kleine_bol
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: kleine_bol_button
          state:
            checked: !lambda return x;

  - platform: homeassistant
    id: staande_lamp_state
    entity_id: light.staande_lamp
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: staande_lamp_button
          state:
            checked: !lambda return x;

  - platform: homeassistant
    id: tv_light_bar_state
    entity_id: light.tv_light_bar
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: tv_light_bar_button
          state:
            checked: !lambda return x;

  # ---------------------------------------------------------------------
  # 3D PRINTER SOCKET - highlights the printer button when the smart
  # plug powering the printer is on
  # ---------------------------------------------------------------------
  - platform: homeassistant
    id: printer_socket_state
    entity_id: switch.bambulab_a1_mini_stopcontact_1
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: printer_button
          state:
            checked: !lambda return x;

  # NOTE: Scenes (scene.*) don't have an on/off state in Home Assistant -
  # activating one is a one-shot action, so there's nothing to "watch" for
  # the 4 scene buttons below. They're plain action buttons, not toggles.
