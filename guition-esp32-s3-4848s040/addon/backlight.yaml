# =============================================================================
# BACKLIGHT
# =============================================================================
# The actual screen on/off behavior (auto-off after 10 min idle, wake on
# touch) lives in:
#   - lvgl.yaml   -> lvgl: on_idle: (turns backlight off + pauses LVGL)
#   - device.yaml -> touchscreen: on_touch: (turns backlight on + resumes LVGL)
# =============================================================================

light:
  - platform: monochromatic
    name: Backlight
    id: backlight
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 1s
    internal: true
